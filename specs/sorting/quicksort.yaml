spec_version: "1.0"
metadata:
  name: "Quicksort"
  category: "sorting"
  complexity:
    time: "O(n log n) average, O(n^2) worst"
    space: "O(log n) average"
  tags: ["sorting", "divide-and-conquer", "in-place"]

contracts:
  postconditions:
    - "array is sorted in ascending order"
    - "array contains same multiset of elements"

methods:
  - name: "quicksort"
    params:
      - name: "arr"
        type: "&mut [T]"
    preconditions:
      - "arr is valid slice"
    postconditions:
      - "arr is sorted ascending"

  - name: "partition"
    params:
      - name: "arr"
        type: "&mut [T]"
      - name: "low"
        type: "usize"
      - name: "high"
        type: "usize"
    returns: "usize"
    postconditions:
      - "pivot is in final sorted position"
      - "elements left of pivot <= pivot"
      - "elements right of pivot >= pivot"

verification:
  test_cases:
    - name: "sort_unsorted_array"
      setup: "let mut arr = vec![3, 1, 4, 1, 5, 9, 2, 6];"
      actions:
        - "quicksort(&mut arr)"
      assertions:
        - "assert_eq!(arr, vec![1, 1, 2, 3, 4, 5, 6, 9])"

    - name: "sort_empty_array"
      setup: "let mut arr: Vec<i32> = vec![];"
      actions:
        - "quicksort(&mut arr)"
      assertions:
        - "assert_eq!(arr, vec![])"

    - name: "sort_single_element"
      setup: "let mut arr = vec![42];"
      actions:
        - "quicksort(&mut arr)"
      assertions:
        - "assert_eq!(arr, vec![42])"

    - name: "sort_already_sorted"
      setup: "let mut arr = vec![1, 2, 3, 4, 5];"
      actions:
        - "quicksort(&mut arr)"
      assertions:
        - "assert_eq!(arr, vec![1, 2, 3, 4, 5])"
