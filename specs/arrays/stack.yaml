spec_version: "1.0"
metadata:
  name: "Stack"
  category: "arrays"
  complexity:
    time: "O(1) push/pop, O(n) search"
    space: "O(n)"
  tags: ["stack", "LIFO", "array"]

contracts:
  invariants:
    - "length >= 0"

structs:
  - name: "Stack"
    generics:
      - name: "T"
        constraints: ["Clone"]
    fields:
      - name: "items"
        type: "Vec<T>"

methods:
  - name: "new"
    returns: "Self"
    postconditions:
      - "length == 0"

  - name: "push"
    params:
      - name: "item"
        type: "T"
    postconditions:
      - "length == old.length + 1"
      - "top == item"

  - name: "pop"
    returns: "Option<T>"
    preconditions:
      - "length > 0"
    postconditions:
      - "length == old.length - 1"

  - name: "peek"
    returns: "Option<&T>"
    preconditions:
      - "length > 0"

  - name: "is_empty"
    returns: "bool"

  - name: "len"
    returns: "usize"

verification:
  test_cases:
    - name: "push_and_pop"
      setup: "let mut s = Stack::new();"
      actions:
        - "s.push(1)"
        - "s.push(2)"
      assertions:
        - "assert_eq!(s.pop(), Some(2))"
        - "assert_eq!(s.pop(), Some(1))"
        - "assert!(s.is_empty())"

    - name: "peek_returns_top"
      setup: "let mut s = Stack::new();"
      actions:
        - "s.push(42)"
      assertions:
        - "assert_eq!(s.peek(), Some(&42))"

    - name: "pop_empty_returns_none"
      setup: "let mut s = Stack::<i32>::new();"
      assertions:
        - "assert_eq!(s.pop(), None)"

    - name: "len_tracks_elements"
      setup: "let mut s = Stack::new();"
      actions:
        - "s.push(10)"
        - "s.push(20)"
      assertions:
        - "assert_eq!(s.len(), 2)"
