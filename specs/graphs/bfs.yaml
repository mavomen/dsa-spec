spec_version: "1.0"
metadata:
  name: "BFS"
  category: "graphs"
  complexity:
    time: "O(V + E)"
    space: "O(V)"
  tags: ["graph", "traversal", "breadth-first", "queue"]

contracts:
  invariants:
    - "visited set contains no duplicates"
    - "all visited vertices exist in graph"

methods:
  - name: "bfs"
    params:
      - name: "graph"
        type: "&Graph<T>"
      - name: "start"
        type: "T"
    returns: "Vec<T>"
    preconditions:
      - "start vertex exists in graph"
    postconditions:
      - "result contains all reachable vertices from start"
      - "result has no duplicates"
      - "order follows breadth-first traversal"

verification:
  test_cases:
    - name: "bfs_level_order"
      setup: |
        let mut g = Graph::new(false);
        g.add_vertex(1);
        g.add_vertex(2);
        g.add_vertex(3);
        g.add_vertex(4);
        g.add_edge(1, 2);
        g.add_edge(1, 3);
        g.add_edge(2, 4);
      assertions:
        - "let order = bfs(&g, 1);"
        - "assert_eq!(order[0], 1)"
        - "assert!(order[1] == 2 && order[2] == 3 || order[1] == 3 && order[2] == 2)"
        - "assert_eq!(order[3], 4)"

    - name: "bfs_disconnected"
      setup: |
        let mut g = Graph::new(false);
        g.add_vertex(1);
        g.add_vertex(2);
      assertions:
        - "assert_eq!(bfs(&g, 1), vec![1])"

    - name: "bfs_single_node"
      setup: |
        let mut g = Graph::new(false);
        g.add_vertex(42);
      assertions:
        - "assert_eq!(bfs(&g, 42), vec![42])"
