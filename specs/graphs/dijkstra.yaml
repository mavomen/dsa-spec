spec_version: "1.0"
metadata:
  name: "Dijkstra"
  category: "graphs"
  complexity:
    time: "O((V + E) log V)"
    space: "O(V)"
  tags: ["graph", "shortest-path", "greedy", "single-source"]

contracts:
  preconditions:
    - "all edge weights are non-negative"
  postconditions:
    - "distance to start vertex is 0"
    - "distances are the shortest path distances"

methods:
  - name: "dijkstra"
    params:
      - name: "graph"
        type: "HashMap<usize, Vec<(usize, usize)>>"
      - name: "start"
        type: "usize"
    returns: "HashMap<usize, usize>"
    preconditions:
      - "start vertex exists in graph"
      - "all edge weights >= 0"
    postconditions:
      - "result contains all reachable vertices"
      - "result[start] == 0"

  - name: "shortest_path"
    params:
      - name: "graph"
        type: "HashMap<usize, Vec<(usize, usize)>>"
      - name: "start"
        type: "usize"
      - name: "end"
        type: "usize"
    returns: "Option<Vec<usize>>"
    preconditions:
      - "start and end exist in graph"
    postconditions:
      - "if path exists, first element is start and last is end"

verification:
  test_cases:
    - name: "simple_path"
      setup: "let mut graph: HashMap<usize, Vec<(usize, usize)>> = HashMap::new();"
      actions:
        - "graph.insert(0, vec![(1, 4), (2, 1)])"
        - "graph.insert(1, vec![(3, 1)])"
        - "graph.insert(2, vec![(1, 2), (3, 5)])"
        - "graph.insert(3, vec![])"
        - "let dist = dijkstra(&graph, 0)"
      assertions:
        - "assert_eq!(dist[&0], 0)"
        - "assert_eq!(dist[&1], 3)"
        - "assert_eq!(dist[&2], 1)"
        - "assert_eq!(dist[&3], 4)"

    - name: "unreachable_vertex"
      setup: "let mut graph: HashMap<usize, Vec<(usize, usize)>> = HashMap::new();"
      actions:
        - "graph.insert(0, vec![(1, 1)])"
        - "graph.insert(1, vec![])"
        - "graph.insert(2, vec![])"
        - "let dist = dijkstra(&graph, 0)"
      assertions:
        - "assert_eq!(dist[&0], 0)"
        - "assert_eq!(dist[&1], 1)"
        - "assert!(!dist.contains_key(&2))"
