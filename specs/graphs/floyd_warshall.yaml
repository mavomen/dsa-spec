spec_version: "1.0"
metadata:
  name: "FloydWarshall"
  category: "graphs"
  complexity:
    time: "O(V^3)"
    space: "O(V^2)"
  tags: ["graph", "shortest-path", "all-pairs", "dynamic-programming"]

contracts:
  preconditions:
    - "no negative weight cycles"
  postconditions:
    - "dist[i][i] == 0 for all i"
    - "dist[i][j] is the shortest path distance"

methods:
  - name: "floyd_warshall"
    params:
      - name: "graph"
        type: "Vec<Vec<Option<usize>>>"
    returns: "Vec<Vec<Option<usize>>>"
    preconditions:
      - "graph is square (n x n)"
      - "graph[i][i] == Some(0) for all i"
    postconditions:
      - "result is square (n x n)"
      - "result[i][i] == Some(0) for all i"

verification:
  test_cases:
    - name: "three_vertex_graph"
      setup: "let n = 3;"
      actions:
        - "let mut graph = vec![vec![None; n]; n]"
        - "graph[0][0] = Some(0); graph[0][1] = Some(3); graph[0][2] = Some(8)"
        - "graph[1][0] = Some(3); graph[1][1] = Some(0); graph[1][2] = Some(1)"
        - "graph[2][0] = Some(8); graph[2][1] = Some(1); graph[2][2] = Some(0)"
        - "let dist = floyd_warshall(&graph)"
      assertions:
        - "assert_eq!(dist[0][1], Some(3))"
        - "assert_eq!(dist[0][2], Some(4))"
        - "assert_eq!(dist[1][2], Some(1))"
        - "assert_eq!(dist[2][0], Some(4))"
        - "assert_eq!(dist[0][0], Some(0))"

    - name: "single_vertex"
      setup: "let n = 1;"
      actions:
        - "let graph = vec![vec![Some(0)]]"
        - "let dist = floyd_warshall(&graph)"
      assertions:
        - "assert_eq!(dist[0][0], Some(0))"

    - name: "disconnected_vertices"
      setup: "let n = 4;"
      actions:
        - "let mut graph = vec![vec![None; n]; n]"
        - "graph[0][0] = Some(0); graph[0][1] = Some(2)"
        - "graph[1][0] = Some(2); graph[1][1] = Some(0)"
        - "graph[2][2] = Some(0)"
        - "graph[3][3] = Some(0)"
        - "let dist = floyd_warshall(&graph)"
      assertions:
        - "assert_eq!(dist[0][1], Some(2))"
        - "assert!(dist[0][2].is_none())"
        - "assert!(dist[2][3].is_none())"
